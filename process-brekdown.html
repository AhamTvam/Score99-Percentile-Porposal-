    <!-- Premium Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <style>
        /* ==========================================================================
           1. CORE VARIABLES & SETUP
           ========================================================================== */
        :root {
            /* Strict Color Palette */
            --bg-main: #000000;
            --text-main: #FFFFFF;
            --accent-primary: #FFA500;
            --accent-secondary: #0A1543;
            
            /* RGB Values for Opacity/Gradients */
            --rgb-primary: 255, 165, 0;
            --rgb-secondary: 10, 21, 67;
            --rgb-white: 255, 255, 255;
            
            /* Typography */
            --font-main: 'Inter', sans-serif;
            
            /* Layout & Spacing */
            --container-w: 1280px;
            --section-pad: 140px;
            
            /* Transitions */
            --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
            --transition-smooth: all 0.5s var(--ease-out);
            --transition-fast: all 0.2s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
            background-color: var(--bg-main);
            color: var(--text-main);
            font-family: var(--font-main);
            -webkit-font-smoothing: antialiased;
        }

        body {
            overflow-x: hidden;
            position: relative;
        }

        /* Ambient Background Glows */
        body::before {
            content: '';
            position: fixed;
            top: -20vh; left: -10vw; width: 60vw; height: 60vh;
            background: radial-gradient(circle, rgba(var(--rgb-secondary), 0.4) 0%, transparent 70%);
            z-index: -1; pointer-events: none;
        }
        body::after {
            content: '';
            position: fixed;
            bottom: -20vh; right: -10vw; width: 60vw; height: 60vh;
            background: radial-gradient(circle, rgba(var(--rgb-primary), 0.05) 0%, transparent 70%);
            z-index: -1; pointer-events: none;
        }

        a { text-decoration: none; color: inherit; }
        ul { list-style: none; }
        
        .container {
            max-width: var(--container-w);
            margin: 0 auto;
            padding: 0 5%;
            position: relative;
            z-index: 2;
        }

        /* ==========================================================================
           2. TYPOGRAPHY
           ========================================================================== */
        h1, h2, h3, h4, h5 {
            font-weight: 800;
            line-height: 1.1;
            letter-spacing: -0.03em;
        }

        .text-orange { color: var(--accent-primary); }
        
        p {
            font-size: 1.125rem;
            line-height: 1.7;
            color: rgba(var(--rgb-white), 0.7);
            font-weight: 400;
        }

        .eyebrow {
            font-size: 0.875rem;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: var(--accent-primary);
            font-weight: 600;
            margin-bottom: 1rem;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .eyebrow::before {
            content: '';
            width: 8px; height: 8px;
            background: var(--accent-primary);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--accent-primary);
        }

        /* ==========================================================================
           3. BUTTONS & COMPONENTS
           ========================================================================== */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 1rem 2rem;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 100px;
            transition: var(--transition-smooth);
            cursor: pointer;
            gap: 0.75rem;
            letter-spacing: -0.01em;
        }

        .btn-primary {
            background-color: var(--accent-primary);
            color: var(--bg-main);
            border: 1px solid var(--accent-primary);
            box-shadow: 0 4px 20px rgba(var(--rgb-primary), 0.15);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(var(--rgb-primary), 0.3);
            background-color: #ffb732;
        }

        .btn-secondary {
            background-color: transparent;
            color: var(--text-main);
            border: 1px solid rgba(var(--rgb-white), 0.2);
            backdrop-filter: blur(10px);
        }

        .btn-secondary:hover {
            border-color: var(--accent-primary);
            background: rgba(var(--rgb-primary), 0.05);
            transform: translateY(-2px);
            color: var(--accent-primary);
        }

        /* Scroll Reveal Animation */
        .reveal {
            opacity: 0;
            transform: translateY(40px);
            transition: 1s var(--ease-out);
        }
        .reveal.active {
            opacity: 1;
            transform: translateY(0);
        }
        .delay-1 { transition-delay: 0.1s; }
        .delay-2 { transition-delay: 0.2s; }
        .delay-3 { transition-delay: 0.3s; }

        /* ==========================================================================
           4. NAVIGATION
           ========================================================================== */
        .nav {
            position: fixed;
            top: 0; left: 0; right: 0;
            padding: 1.5rem 0;
            z-index: 1000;
            transition: var(--transition-smooth);
            border-bottom: 1px solid transparent;
        }

        .nav.scrolled {
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(var(--rgb-white), 0.05);
            padding: 1rem 0;
        }

        .nav-wrapper {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .logo-img {
            height: 36px;
            width: auto;
            object-fit: contain;
        }

        .logo-text {
            font-weight: 800;
            font-size: 1.25rem;
            letter-spacing: -0.02em;
        }
        .logo-text span { color: var(--accent-primary); }

        .nav-links {
            display: flex;
            gap: 2.5rem;
            align-items: center;
        }

        .nav-link {
            font-size: 0.875rem;
            font-weight: 500;
            color: rgba(var(--rgb-white), 0.7);
            transition: var(--transition-fast);
            position: relative;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .nav-link:hover { color: var(--text-main); }
        .nav-link::after {
            content: '';
            position: absolute;
            bottom: -6px; left: 0;
            width: 0%; height: 2px;
            background: var(--accent-primary);
            transition: var(--transition-fast);
        }
        .nav-link:hover::after { width: 100%; }

        /* ==========================================================================
           5. HERO SECTION
           ========================================================================== */
        .hero {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 200px 0 100px;
            text-align: center;
            position: relative;
        }

        .hero h1 {
            font-size: clamp(3rem, 7vw, 6.5rem);
            margin: 1.5rem 0 1rem;
            line-height: 1.05;
        }

        .hero h2 {
            font-size: clamp(1.25rem, 3vw, 2rem);
            font-weight: 400;
            color: rgba(var(--rgb-white), 0.7);
            margin-bottom: 2rem;
        }

        .hero-desc {
            font-size: 1.25rem;
            max-width: 800px;
            margin: 0 auto 3rem;
        }

        .hero-cta {
            display: flex;
            gap: 1.5rem;
            justify-content: center;
            flex-wrap: wrap;
        }

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const navbar = document.getElementById('navbar');
            window.addEventListener('scroll', () => {
                if (window.scrollY > 50) {
                    navbar.classList.add('scrolled');
                } else {
                    navbar.classList.remove('scrolled');
                }
            });
